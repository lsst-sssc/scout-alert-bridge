services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scout_bridge
      POSTGRES_USER: scout_bridge
      POSTGRES_PASSWORD: scout_bridge
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U scout_bridge']
      interval: 5s
      timeout: 3s
      retries: 10

  # One poll cycle against the compose Postgres (mirrors the k8s CronJob).
  # Usage: docker compose run --rm bridge   (or `up db -d` and run manage.py locally
  # with DB_HOST=localhost DB_PORT=5433 DB_PASSWORD=scout_bridge)
  bridge:
    build: .
    profiles: ['cycle']
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: scout_bridge
      DB_USER: scout_bridge
      DB_PASSWORD: scout_bridge
      SCOUT_TOPIC_URL: ${SCOUT_TOPIC_URL:-kafka://kafka.scimma.org/lco.scout-neo-too-test}
      SCIMMA_USERNAME: ${SCIMMA_USERNAME:-}
      SCIMMA_PASSWORD: ${SCIMMA_PASSWORD:-}

  # Single-node plaintext Kafka broker for exercising the real publish path (hop-client
  # producer, SCOUT_TOPIC_URL parsing, ack/retry logic) before real SCiMMA credentials
  # exist. Not SCiMMA-compatible auth-wise — just the wire protocol.
  # Usage: docker compose --profile localkafka up -d kafka
  #        SCOUT_TOPIC_URL=kafka://localhost:9094/scout-test SCOUT_NO_AUTH=1 \
  #          docker compose run --rm -e SCOUT_TOPIC_URL -e SCOUT_NO_AUTH bridge \
  #          sh -c "python manage.py migrate && python manage.py bootstrap_scout_query && \
  #                 python manage.py ingest_scout && python manage.py publish_scout_events"
  #        docker compose exec kafka /opt/kafka/bin/kafka-console-consumer.sh \
  #          --bootstrap-server localhost:9092 --topic scout-test --from-beginning
  kafka:
    image: apache/kafka:3.8.0
    profiles: ['localkafka']
    ports:
      - '9094:9094'
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'

volumes:
  pgdata:
